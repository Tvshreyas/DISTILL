<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distill — Offline</title>
    <style>
        body {
            background-color: #FDFCF8;
            color: #1a1a1a;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 400px;
            padding: 2rem;
            border: 3px solid #1a1a1a;
            box-shadow: 6px 6px 0px #9BAF9D;
            background: white;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #9BAF9D;
        }
        p {
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .btn {
            background-color: #FFB7B2;
            color: #1a1a1a;
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            border: 2px solid #1a1a1a;
            font-weight: bold;
            display: inline-block;
            box-shadow: 3px 3px 0px #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>You're Offline</h1>
        <p>Distill is a thinking tool. Take this moment of silence to continue your reflection. We'll be back online soon.</p>
        <a href="/" class="btn">Try Again</a>
    </div>
</body>
</html>
